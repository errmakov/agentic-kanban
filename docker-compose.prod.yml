services:
  factorywall:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-errmakov}/factorywall:latest
    container_name: factorywall
    restart: unless-stopped
    ports:
      - "${FACTORYWALL_EXTERNAL_PORT:-3000}:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
