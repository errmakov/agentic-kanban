name: "Agent: Deploy (batch over Ready to Deploy)"

# Hand-kicked batch deploy (contro.lol pattern).
# Merges every PR whose issue sits in "Ready to Deploy", builds ONE image from master,
# pushes to GHCR, deploys to the VPS via Docker Compose, then moves those issues to Done.
# Trigger manually from the Actions tab (or `gh workflow run agent-deploy.yml`).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would be deployed without merging or deploying'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

env:
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
  PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
  FW_PROJECT_META: ${{ vars.FW_PROJECT_META }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/factorywall

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_PAT }}

      - name: Find items in "Ready to Deploy"
        id: collect
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x ./scripts/poll-board.sh
          ./scripts/poll-board.sh "$PROJECT_OWNER" "$PROJECT_NUMBER" > board-state.json
          jq -c '[ .[] | select(.status == "Ready to Deploy") ]' board-state.json > ready.json
          COUNT=$(jq 'length' ready.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::${COUNT} item(s) in Ready to Deploy"
          cat ready.json

      - name: Nothing to deploy
        if: steps.collect.outputs.count == '0'
        run: |
          echo "::warning::No items in Ready to Deploy — nothing to ship."

      - name: Merge approved PRs into master
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        id: merge
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          MERGED=""
          FAILED=""
          while read -r item; do
            ISSUE=$(echo "$item" | jq -r '.number')
            BRANCH="agent/issue-${ISSUE}"

            # Already merged (e.g. a retried deploy)? Count it and move on.
            MERGED_PR=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state merged --json number -q '.[0].number // empty')
            if [ -n "$MERGED_PR" ]; then
              echo "PR for #${ISSUE} already merged; including in deploy"
              MERGED="$MERGED $ISSUE"
              continue
            fi

            OPEN_PR=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json number -q '.[0].number // empty')
            if [ -z "$OPEN_PR" ]; then
              echo "::warning::No PR for #${ISSUE}; skipping"
              FAILED="$FAILED $ISSUE"
              continue
            fi

            gh pr ready "$OPEN_PR" --repo "${{ github.repository }}" 2>/dev/null || true
            if gh pr merge "$OPEN_PR" --repo "${{ github.repository }}" --squash --delete-branch --body "Batch-deployed for #${ISSUE}"; then
              echo "Merged PR #${OPEN_PR} (issue #${ISSUE})"
              MERGED="$MERGED $ISSUE"
            else
              echo "::warning::Merge failed for #${ISSUE} (conflict) — dispatching agent-resolve (stays in Ready to Deploy)"
              FAILED="$FAILED $ISSUE"
              # Flag it on the board so it's not mistaken for a freshly-approved card: it
              # was skipped on a conflict and needs ANOTHER deploy once resolve fixes it.
              gh api --method POST "repos/${{ github.repository }}/issues/$ISSUE/labels" -f "labels[]=redeploy-required" >/dev/null 2>&1 || true
              gh api --method POST "repos/${{ github.repository }}/actions/workflows/agent-resolve.yml/dispatches" -f ref=master -f "inputs[issue_number]=$ISSUE" >/dev/null 2>&1 || true
            fi
          done < <(jq -c '.[]' ready.json)

          echo "merged=${MERGED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "::notice::Merged:${MERGED:-none} | Skipped:${FAILED:-none}"

          if [ -z "$MERGED" ]; then
            echo "::error::No PRs merged — aborting deploy."
            exit 1
          fi

      - name: Refresh master after merges
        id: refresh
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        run: |
          git fetch origin master
          git checkout master
          git reset --hard origin/master
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.refresh.outputs.sha }}
          build-args: |
            GIT_SHA=${{ steps.refresh.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create env files for the VPS
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        run: |
          cat > .env <<ENVEOF
          GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
          FACTORYWALL_EXTERNAL_PORT=${{ vars.FACTORYWALL_EXTERNAL_PORT }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

          cat > .env.production <<ENVEOF
          NODE_ENV=production
          PORT=3000
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.production

      - name: Copy compose + env to VPS
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: "docker-compose.prod.yml,.env,.env.production"
          target: "${{ vars.DEPLOY_PATH }}"
          overwrite: true

      - name: Deploy on VPS
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          command_timeout: 10m
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af

            container="factorywall"
            echo "Waiting for ${container} to become healthy..."
            for i in $(seq 1 18); do
              status=$(docker inspect --format='{{.State.Status}}' "$container" 2>/dev/null || echo "missing")
              health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$container" 2>/dev/null || echo "unknown")

              if [ "$status" != "running" ]; then
                echo "FATAL: ${container} is not running (status: ${status})"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              if [ "$health" = "healthy" ] || [ "$health" = "no-healthcheck" ]; then
                echo "${container} is up (health: ${health})"
                break
              fi

              if [ "$health" = "unhealthy" ]; then
                echo "FATAL: ${container} is unhealthy"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              if [ "$i" -eq 18 ]; then
                echo "FATAL: ${container} did not become healthy within 90s (health: ${health})"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              sleep 5
            done

            docker compose -f docker-compose.prod.yml ps

      - name: Smoke test PRODUCTION_URL
        if: steps.collect.outputs.count != '0' && inputs.dry_run != true
        run: |
          URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::No PRODUCTION_URL set — skipping smoke test"
            exit 0
          fi
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30)
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 400 ]; then
            echo "::error::Smoke test failed (HTTP $CODE)"
            exit 1
          fi

          # Assert the LIVE build is the one we just shipped (catches stale/no-op deploys).
          EXPECT="${{ steps.refresh.outputs.sha }}"
          LIVE=$(curl -s "$URL/api/health" --max-time 30 | jq -r '.version // ""')
          if [ "$LIVE" != "$EXPECT" ]; then
            echo "::error::Stale deploy: live version '${LIVE}' != built '${EXPECT}'"
            exit 1
          fi
          echo "::notice::Smoke test passed (HTTP $CODE, version ${LIVE})"

      - name: Move merged items to Done + close
        if: success() && steps.collect.outputs.count != '0' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x ./scripts/move-issue.sh
          # One board scan reused for every merged issue (was one GraphQL scan PER issue).
          BOARD_JSON=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500)
          for ISSUE in ${{ steps.merge.outputs.merged }}; do
            ITEM_ID=$(jq -r --argjson num "$ISSUE" '.items[] | select(.content.number == $num) | .id' <<<"$BOARD_JSON")
            if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
              ./scripts/move-issue.sh "$PROJECT_OWNER" "$PROJECT_NUMBER" "$ITEM_ID" "Done"
            fi
            gh issue close "$ISSUE" --repo "${{ github.repository }}" \
              --comment "✅ **Batch-deployed to production.**" 2>/dev/null || true
            gh api --method DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/review-notified" >/dev/null 2>&1 || true
            # It shipped — clear the redeploy flag (set on a prior conflict-skip round, if any).
            gh api --method DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/redeploy-required" >/dev/null 2>&1 || true
          done

      - name: On failure — alert (items stay in Ready to Deploy for re-run)
        if: failure() && inputs.dry_run != true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x ./scripts/notify-telegram.sh
          ./scripts/notify-telegram.sh \
            "⚠️ Batch deploy failed. Items remain in *Ready to Deploy* — fix and re-run the deploy workflow. Check the run logs."
