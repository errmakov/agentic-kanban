name: "Deploy: baseline (no board)"

# Builds the current `master` as-is and deploys it to the VPS — no board interaction,
# no PR merging. Two uses:
#   1. Initial VPS bring-up (milestone M2), before any agent has run.
#   2. Restoring the clean baseline app between rehearsals (after reset-rehearsal.sh).
# Trigger manually from the Actions tab (or `gh workflow run deploy-baseline.yml`).

on:
  workflow_dispatch:
    inputs:
      wipe_data:
        description: 'Wipe the persisted data volume for a clean-slate baseline'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/factorywall

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:baseline
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create env files for the VPS
        run: |
          cat > .env <<ENVEOF
          GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
          FACTORYWALL_EXTERNAL_PORT=${{ vars.FACTORYWALL_EXTERNAL_PORT }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

          cat > .env.production <<ENVEOF
          NODE_ENV=production
          PORT=3000
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.production

      - name: Copy compose + env to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: "docker-compose.prod.yml,.env,.env.production"
          target: "${{ vars.DEPLOY_PATH }}"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          command_timeout: 10m
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Rehearsals are independent: a baseline deploy is a clean slate, so by
            # default drop the persisted data volume (reactions/timer/tallies) before
            # bringing the app up. `down -v` removes the compose-declared
            # factorywall-data volume; `up -d` then recreates it empty.
            # Set wipe_data=false to keep the volume (e.g. mid-rehearsal manual restore).
            if [ "${{ inputs.wipe_data }}" != "false" ]; then
              echo "Wiping data volume for a clean baseline..."
              docker compose -f docker-compose.prod.yml down -v --remove-orphans 2>/dev/null || true
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af

            container="factorywall"
            echo "Waiting for ${container} to become healthy..."
            for i in $(seq 1 18); do
              status=$(docker inspect --format='{{.State.Status}}' "$container" 2>/dev/null || echo "missing")
              health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$container" 2>/dev/null || echo "unknown")

              if [ "$status" != "running" ]; then
                echo "FATAL: ${container} is not running (status: ${status})"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              if [ "$health" = "healthy" ] || [ "$health" = "no-healthcheck" ]; then
                echo "${container} is up (health: ${health})"
                break
              fi

              if [ "$health" = "unhealthy" ]; then
                echo "FATAL: ${container} is unhealthy"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              if [ "$i" -eq 18 ]; then
                echo "FATAL: ${container} did not become healthy within 90s (health: ${health})"
                docker logs --tail 40 "$container" 2>&1 || true
                exit 1
              fi

              sleep 5
            done

            docker compose -f docker-compose.prod.yml ps

      - name: Smoke test PRODUCTION_URL
        run: |
          URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::No PRODUCTION_URL set — skipping smoke test"
            exit 0
          fi
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30)
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 400 ]; then
            echo "::error::Smoke test failed (HTTP $CODE)"
            exit 1
          fi

          # Assert the LIVE build is the one we just shipped (catches stale/no-op deploys).
          EXPECT="${{ github.sha }}"
          LIVE=$(curl -s "$URL/api/health" --max-time 30 | jq -r '.version // ""')
          if [ "$LIVE" != "$EXPECT" ]; then
            echo "::error::Stale deploy: live version '${LIVE}' != built '${EXPECT}'"
            exit 1
          fi
          echo "::notice::Smoke test passed (HTTP $CODE, version ${LIVE})"
