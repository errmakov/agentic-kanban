name: "Agent: Testing"
run-name: "Agent: Testing · #${{ inputs.issue_number }}"

# Writes unit and e2e tests for the implemented feature, then runs the suite.
# Pull system, and Test is the RIGHTMOST value-add silo (no downstream agent to
# pull from it), so on success it PUSHES the card to Human Review.
# On failure it does NOT retry in-place; it flags `blocker` and stops — the
# dispatcher then swarms the blocker via agent-fix (visible "stop the line").

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to test'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
  PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_PAT }}
          ref: "agent/issue-${{ inputs.issue_number }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: npm ci

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          PR=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:agent/issue-${{ inputs.issue_number }}&state=open" -q '.[0].number // empty')
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          echo "Resolved PR: #${PR:-none}"

      - name: Gather context
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x ./scripts/get-issue-context.sh
          ./scripts/get-issue-context.sh "${{ github.repository }}" "${{ inputs.issue_number }}" > /tmp/issue-context.md

          if [ -n "${{ steps.pr.outputs.pr_number }}" ]; then
            gh pr diff "${{ steps.pr.outputs.pr_number }}" --repo "${{ github.repository }}" > /tmp/pr-diff.txt 2>/dev/null || true
          fi
          touch /tmp/pr-diff.txt
          echo "--- PR Diff Stats ---"
          wc -l /tmp/pr-diff.txt

      - name: Run Claude Code — write tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_CONTEXT=$(cat /tmp/issue-context.md)
          PR_DIFF=$(cat /tmp/pr-diff.txt)
          TEST_PROMPT=$(cat ./prompts/test-system.md)

          claude -p "$(cat <<PROMPT
          ${TEST_PROMPT}

          ## Issue Context

          ${ISSUE_CONTEXT}

          ## PR Diff (what was implemented)

          \`\`\`diff
          ${PR_DIFF}
          \`\`\`

          ## Instructions

          1. Read CLAUDE.md for project test conventions
          2. Read the changed files to understand the implementation
          3. Write unit tests for all new/changed functions
          4. Write e2e tests for any new user-facing flows
          5. Run the test suite and fix any failures
          PROMPT
          )" \
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(npm run test *),Bash(npm test *),Bash(npx vitest *),Bash(npx playwright *),Bash(npm run test:e2e *),Bash(npm run lint),Bash(npm run typecheck),Bash(git diff *),Bash(git status)" \
            --model claude-sonnet-4-6 \
            --max-turns 25 \
            --output-format json | tee /tmp/claude.json | jq -r '.result // empty'

      - name: Report agent spend
        if: always()
        run: |
          [ -s /tmp/claude.json ] || exit 0
          chmod +x ./scripts/agent-cost.sh
          ./scripts/agent-cost.sh "test" /tmp/claude.json "${{ github.repository }}" "${{ inputs.issue_number }}"

      - name: Run test suite — verify
        id: verify
        run: |
          set +e
          npm run test 2>&1 | tee /tmp/test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          echo "test_exit=$TEST_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "::warning::Tests failing (exit $TEST_EXIT) — will flag blocker"
          else
            echo "::notice::All tests passing"
          fi

      - name: Commit and push test code
        run: |
          BRANCH="agent/issue-${{ inputs.issue_number }}"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No test changes to commit"
          else
            git config user.name "agentic-kanban[bot]"
            git config user.email "agentic-kanban[bot]@users.noreply.github.com"
            git add -A
            git commit -m "test: add tests for #${{ inputs.issue_number }}" -m "Automated tests by agent-test."
            git push origin "$BRANCH" --force-with-lease
          fi

      # ---------- PASS → screenshot the PR build, send the review album ----------
      # Best-effort and branch-independent: this step body is read from the default
      # branch, but the checkout above swapped the workspace to the PR branch (which
      # predates any new scripts/ helper), so the capture + Telegram upload are INLINED
      # here rather than calling a checked-out script. A failure here never blocks the
      # green path (continue-on-error) — the dispatcher then falls back to a text-only
      # review notice (it skips only when `review-notified` is set, which we set only
      # after the album actually sends).
      - name: On pass — capture screenshots & send review album (best-effort)
        if: steps.verify.outputs.test_exit == '0'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          REPO="${{ github.repository }}"
          ISSUE="${{ inputs.issue_number }}"

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram creds absent — skipping screenshots (dispatcher sends text)."
            exit 0
          fi

          TITLE=$(gh api "repos/$REPO/issues/$ISSUE" -q '.title' 2>/dev/null || echo "#$ISSUE")
          PR_URL=$(gh api "repos/$REPO/pulls?head=${{ github.repository_owner }}:agent/issue-$ISSUE&state=open" -q '.[0].html_url // ""')

          # Build + boot the PR build so we screenshot exactly what's under review.
          npm run build || { echo "build failed — skipping screenshots"; exit 0; }
          npx playwright install --with-deps chromium || npx playwright install chromium

          npm run start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000 >/dev/null 2>&1 && break
            sleep 2
          done

          # Screenshot three breakpoints. Written to the workspace root so Node resolves
          # the project's node_modules (a /tmp script could not import @playwright/test).
          mkdir -p /tmp/shots
          cat > _capture-shots.mjs <<'MJS'
          import { chromium } from '@playwright/test';
          const URL = process.env.SHOT_URL || 'http://127.0.0.1:3000';
          const widths = [['mobile', 390, 844], ['tablet', 768, 1024], ['desktop', 1440, 900]];
          const browser = await chromium.launch();
          for (const [name, width, height] of widths) {
            const page = await browser.newPage({ viewport: { width, height } });
            try {
              await page.goto(URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await page.waitForTimeout(1200);
              await page.screenshot({ path: `/tmp/shots/shot-${name}.png`, fullPage: true });
              console.log('captured', name);
            } catch (e) {
              console.error('failed', name, e.message);
            }
            await page.close();
          }
          await browser.close();
          MJS
          SHOT_URL=http://127.0.0.1:3000 node _capture-shots.mjs
          kill "$SERVER_PID" 2>/dev/null || true
          rm -f _capture-shots.mjs

          shots=(); for n in mobile tablet desktop; do [ -s "/tmp/shots/shot-$n.png" ] && shots+=("/tmp/shots/shot-$n.png"); done
          if [ "${#shots[@]}" -eq 0 ]; then
            echo "No screenshots captured — dispatcher will send the text-only review notice."
            exit 0
          fi

          CAPTION=$(printf '%b' "🔍 *Review Needed* — #${ISSUE}: *${TITLE}*\nPR: ${PR_URL}\nIssue: ${{ github.server_url }}/${REPO}/issues/${ISSUE}\n\nScreens: mobile · tablet · desktop\nApprove → add the \`approved\` label · Changes → add \`changes-requested\`")

          media='[]'; forms=(); i=0
          for f in "${shots[@]}"; do
            if [ "$i" -eq 0 ]; then
              media=$(echo "$media" | jq --arg m "attach://m$i" --arg c "$CAPTION" '. + [{type:"photo",media:$m,caption:$c,parse_mode:"Markdown"}]')
            else
              media=$(echo "$media" | jq --arg m "attach://m$i" '. + [{type:"photo",media:$m}]')
            fi
            forms+=(-F "m$i=@$f"); i=$((i+1))
          done

          CODE=$(curl -s -o /tmp/tg.out -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMediaGroup" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" -F "media=${media}" "${forms[@]}")
          if [ "$CODE" = "200" ]; then
            gh api --method POST "repos/$REPO/issues/$ISSUE/labels" -f "labels[]=review-notified" >/dev/null 2>&1 || true
            echo "Review album sent (${#shots[@]} shots) + review-notified set."
          else
            echo "::warning::sendMediaGroup HTTP $CODE — dispatcher will send text fallback"
            cat /tmp/tg.out 2>/dev/null || true
          fi
          exit 0

      # ---------- PASS → push to Human Review (Test is the rightmost silo) ----------
      - name: On pass — report + mark Test done (dispatcher pulls to Human Review)
        if: steps.verify.outputs.test_exit == '0'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          TEST_SUMMARY=$(tail -25 /tmp/test-output.txt || true)

          # Best-effort report (a rate-limited comment must NOT strand the card).
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## 🧪 Test Report (automated)

          All tests passing.

          \`\`\`
          ${TEST_SUMMARY}
          \`\`\`

          Marked \`stage:done\` — the dispatcher will move it to Human Review.

          ---
          _Generated by agent-test | $(date -u +%Y-%m-%dT%H:%M:%SZ)_
          EOF
          )" || true

          # Resilience: agent-test no longer does the (GraphQL) board move itself — that
          # could strand the card if GraphQL is rate-limited. We mark done via REST (works
          # even when GraphQL is exhausted); the dispatcher does the Test → Human Review
          # move and retries every tick, so the card is never stuck.
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=stage:done" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true

          gh api --method POST "repos/${{ github.repository }}/actions/workflows/dispatcher.yml/dispatches" -f ref=master >/dev/null 2>&1 || true

      # ---------- FAIL → flag blocker in place; dispatcher will swarm ----------
      - name: On fail — flag blocker, stop the line
        if: steps.verify.outputs.test_exit != '0'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          FAIL_OUT=$(tail -40 /tmp/test-output.txt || true)

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## 🚧 Tests failing — \`blocker\` raised (automated)

          The card stays in **Test**, flagged \`blocker\`. New pulls are halted while
          the swarm (agent-fix) works it.

          \`\`\`
          ${FAIL_OUT}
          \`\`\`

          ---
          _Generated by agent-test | $(date -u +%Y-%m-%dT%H:%M:%SZ)_
          EOF
          )"

          # Raise the blocker and drop the in-flight marker so the dispatcher's next
          # tick dispatches agent-fix on it.
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=blocker" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:done" >/dev/null 2>&1 || true

          gh api --method POST "repos/${{ github.repository }}/actions/workflows/dispatcher.yml/dispatches" -f ref=master >/dev/null 2>&1 || true

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x ./scripts/notify-telegram.sh

          # Workflow itself crashed (not a test failure) → flag for a human.
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=blocker" -f "labels[]=needs-human" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ **Test agent crashed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          ./scripts/notify-telegram.sh \
            "⚠️ Test agent crashed for issue #${{ inputs.issue_number }}. Manual intervention needed."
