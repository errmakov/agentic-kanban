name: "Agent: SA/BA Analysis"

# Performs systems/business analysis on an issue.
# Reads the issue + codebase, posts an analysis comment, moves to Dev.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: string

permissions:
  contents: read
  issues: write

env:
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
  PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Gather issue context
        id: context
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x ./scripts/get-issue-context.sh
          ./scripts/get-issue-context.sh "${{ github.repository }}" "${{ inputs.issue_number }}" > /tmp/issue-context.md
          echo "--- Issue Context ---"
          cat /tmp/issue-context.md

      - name: Run SA/BA analysis
        id: analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_CONTEXT=$(cat /tmp/issue-context.md)
          SABA_PROMPT=$(cat ./prompts/saba-system.md)

          claude -p "$(cat <<PROMPT
          ${SABA_PROMPT}

          ## Issue to Analyze

          ${ISSUE_CONTEXT}

          ## Codebase

          You have access to the full codebase. Use Read, Glob, and Grep to explore it.
          Start by reading CLAUDE.md for project conventions.
          PROMPT
          )" \
            --allowedTools "Read,Glob,Grep" \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
            --output-format json \
          | jq -r '.result' > /tmp/analysis-result.md

          echo "--- Analysis Result ---"
          cat /tmp/analysis-result.md

      - name: Post analysis as issue comment
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          # Prefix with agent marker for downstream agents to identify
          {
            echo "## 🔬 SA/BA Analysis (automated)"
            echo ""
            cat /tmp/analysis-result.md
            echo ""
            echo "---"
            echo "_Generated by agent-saba | $(date -u +%Y-%m-%dT%H:%M:%SZ)_"
          } > /tmp/comment-body.md

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment-body.md

      - name: Mark SA/BA done (await pull) + kick dispatcher
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          # Pull system: do NOT push to Dev. Mark this card done-in-silo and stop.
          # The dispatcher pulls it into Dev only when Dev is under its WIP limit.
          gh issue edit "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
            --add-label "stage:done" --remove-label "stage:doing" || true

          # Nudge the dispatcher to run a tick now so flow propagates immediately.
          gh workflow run dispatcher.yml --repo "${{ github.repository }}" || true

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x ./scripts/notify-telegram.sh

          # Hard agent failure → flag for a human (no auto-swarm for analysis) and
          # clear the in-flight marker so the card isn't stuck counting against WIP.
          gh issue edit "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
            --add-label "blocker" --add-label "needs-human" --remove-label "stage:doing" || true

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ **SA/BA analysis failed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          ./scripts/notify-telegram.sh \
            "⚠️ SA/BA analysis failed for issue #${{ inputs.issue_number }}. Needs manual attention."
