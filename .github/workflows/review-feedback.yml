name: "Human Gate (label-driven)"
run-name: "Human Gate · #${{ github.event.issue.number }} (${{ github.event.label.name }})"

# The human review gate. GitHub forbids approving your own PR, so for a solo
# operator the gate is a LABEL on the issue, not a PR review:
#   add `approved`           → release the card to "Ready to Deploy"
#   add `changes-requested`  → send it back to Dev for rework (agent-dev re-runs)
# Triggered on issues:labeled and filtered to those two labels, so the agents'
# own stage:doing/stage:done/blocker churn never trips it.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  actions: write

env:
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
  PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
  FW_PROJECT_META: ${{ vars.FW_PROJECT_META }}

jobs:
  gate:
    if: github.event.label.name == 'approved' || github.event.label.name == 'changes-requested'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply the human decision
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ISSUE="${{ github.event.issue.number }}"
          DECISION="${{ github.event.label.name }}"

          chmod +x ./scripts/move-issue.sh ./scripts/poll-board.sh

          # Lean board read (same as the dispatcher) instead of the fat item-list.
          ITEM_ID=$(./scripts/poll-board.sh "$PROJECT_OWNER" "$PROJECT_NUMBER" \
            | jq -r --argjson num "$ISSUE" '.[] | select(.number == $num) | .item_id')
          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "::warning::#$ISSUE not on the board — nothing to do"; exit 0
          fi

          if [ "$DECISION" = "approved" ]; then
            echo "::notice::#$ISSUE approved → Ready to Deploy"
            ./scripts/move-issue.sh "$PROJECT_OWNER" "$PROJECT_NUMBER" "$ITEM_ID" "Ready to Deploy"
            for L in approved review-notified stage:doing stage:done; do
              gh api --method DELETE "repos/$REPO/issues/$ISSUE/labels/$L" >/dev/null 2>&1 || true
            done
            gh issue comment "$ISSUE" --repo "$REPO" \
              --body "✅ **Approved by human** → moved to Ready to Deploy. It ships on the next batch deploy."
          else
            echo "::notice::#$ISSUE changes-requested → rework IN PLACE (stays in Human Review)"
            # NO backward move. Moving the card back to Dev violates the pull model and
            # breaks the downstream WIP limit. Instead we rework in the current silo —
            # the card stays in Human Review and agent-dev reworks the existing branch
            # per the feedback (same spirit as the in-place blocker swarm in Test).
            # stage:doing marks rework-in-flight so the dispatcher's Notify holds off
            # re-review; when agent-dev finishes it sets stage:done and the next tick
            # re-sends the review.
            for L in changes-requested review-notified stage:done; do
              gh api --method DELETE "repos/$REPO/issues/$ISSUE/labels/$L" >/dev/null 2>&1 || true
            done
            gh api --method POST "repos/$REPO/issues/$ISSUE/labels" -f "labels[]=stage:doing" >/dev/null 2>&1 || true
            gh issue comment "$ISSUE" --repo "$REPO" \
              --body "🔄 **Changes requested by human.** Reworking in place — the card stays in **Human Review** (no backward move) while agent-dev addresses your feedback, then it re-requests review."
            gh api --method POST "repos/$REPO/actions/workflows/agent-dev.yml/dispatches" \
              -f ref=master \
              -f "inputs[issue_number]=$ISSUE" \
              -f "inputs[rework]=true" \
              -f "inputs[retry_context]=Human reviewer requested changes — read the most recent issue comments for the specifics and address them." >/dev/null 2>&1 || true
          fi
