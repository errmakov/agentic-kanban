name: "Agent: Development"
run-name: "Agent: Development · #${{ inputs.issue_number }}"

# Implements the feature described in the issue, guided by SA/BA analysis.
# Creates a feature branch, writes code, creates a draft PR, moves to Test.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
        type: string
      retry_context:
        description: 'Additional context from a retry (test failures, review feedback)'
        required: false
        type: string
        default: ''
      rework:
        description: 'Set "true" when re-running after a human changes-requested: rework in place in Human Review, then re-test + re-screenshot (do NOT advance via the Dev->Test pull).'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
  PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: npm ci

      - name: Gather full context
        id: context
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x ./scripts/get-issue-context.sh
          ./scripts/get-issue-context.sh "${{ github.repository }}" "${{ inputs.issue_number }}" > /tmp/issue-context.md

          echo "--- Issue Context ---"
          cat /tmp/issue-context.md

      - name: Setup branch
        id: branch
        run: |
          BRANCH="agent/issue-${{ inputs.issue_number }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Check if branch already exists (retry scenario)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch exists, checking out and pulling latest"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            echo "Creating new branch"
            git checkout -b "$BRANCH"
          fi

      - name: Run Claude Code — implement feature
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_CONTEXT=$(cat /tmp/issue-context.md)
          DEV_PROMPT=$(cat ./prompts/dev-system.md)
          RETRY_CONTEXT="${{ inputs.retry_context }}"

          FULL_PROMPT="$(cat <<PROMPT
          ${DEV_PROMPT}

          ## Issue to Implement

          ${ISSUE_CONTEXT}
          PROMPT
          )"

          # Append retry context if this is a retry
          if [ -n "$RETRY_CONTEXT" ]; then
            FULL_PROMPT="$(cat <<PROMPT
          ${FULL_PROMPT}

          ## Retry Context (fix these issues)

          ${RETRY_CONTEXT}
          PROMPT
          )"
          fi

          # --output-format json gives us the spend (total_cost_usd + usage); tee
          # saves it for the spend step and jq prints the result to the live log.
          # pipefail (GitHub's default shell) keeps a claude failure failing the step.
          claude -p "$FULL_PROMPT" \
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(npm install *),Bash(npm run build),Bash(npm run lint),Bash(npm run typecheck),Bash(npm run test),Bash(git diff *),Bash(git status)" \
            --model claude-sonnet-4-6 \
            --max-turns 30 \
            --output-format json | tee /tmp/claude.json | jq -r '.result // empty'

          # Fail fast if Claude did no work (empty output / drained credits / API error).
          # total_cost_usd==0 means no successful model call — fail so the line stops
          # (blocker + needs-human) instead of committing a hollow, baseline PR.
          if [ ! -s /tmp/claude.json ] \
             || [ "$(jq -r '.is_error // false' /tmp/claude.json 2>/dev/null)" = "true" ] \
             || [ "$(jq -r '.total_cost_usd // 0' /tmp/claude.json 2>/dev/null)" = "0" ]; then
            echo "::error::Claude produced no usable result for #${{ inputs.issue_number }} (empty / usage-limit / error) — stopping the line."
            exit 1
          fi

      - name: Report agent spend
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          [ -s /tmp/claude.json ] || exit 0
          chmod +x ./scripts/agent-cost.sh
          ./scripts/agent-cost.sh "dev" /tmp/claude.json "${{ github.repository }}" "${{ inputs.issue_number }}"

      - name: Verify build passes
        run: |
          npm run build 2>&1 || true
          npm run typecheck 2>&1 || true
          npm run lint 2>&1 || true

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"

          git config user.name "agentic-kanban[bot]"
          git config user.email "agentic-kanban[bot]@users.noreply.github.com"

          # Stage first, THEN check. `git diff` (unstaged) does NOT see brand-new untracked
          # files, and an auto-discovered feature is ALL new files (its own folder, no shared
          # edit). Staging first lets `git diff --cached` detect them, so a real feature is
          # never mistaken for "no changes".
          git add -A
          if git diff --cached --quiet; then
            echo "::warning::No changes produced by the agent"
            exit 1
          fi
          git commit -m "$(cat <<'EOF'
          feat: implement #${{ inputs.issue_number }}

          Automated implementation by agent-dev.

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
          EOF
          )"

          git push origin "$BRANCH" --force-with-lease

      - name: Create or update PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          ISSUE_TITLE=$(gh api "repos/${REPO}/issues/${{ inputs.issue_number }}" -q '.title')

          # Check for an existing OPEN PR on this branch (REST, not GraphQL).
          EXISTING_PR=$(gh api "repos/${REPO}/pulls?head=${OWNER}:${BRANCH}&state=open" -q '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists, it's been updated with new commits"
            echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          else
            PR_BODY=$(cat <<EOF
          ## Summary

          Automated implementation for #${{ inputs.issue_number }}.

          See the SA/BA analysis and implementation notes in the issue comments.

          ## Linked Issue

          Closes #${{ inputs.issue_number }}

          ---
          _Generated by agent-dev_
          EOF
          )
            PR_JSON=$(gh api --method POST "repos/${REPO}/pulls" \
              -f title="feat: ${ISSUE_TITLE}" \
              -f head="$BRANCH" \
              -f base="master" \
              -f body="$PR_BODY" \
              -F draft=true)
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            PR_URL=$(echo "$PR_JSON" | jq -r '.html_url')
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "Created PR: $PR_URL"
          fi

      - name: Post implementation comment
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          DIFF_STAT=$(git diff --stat origin/master..."$BRANCH" 2>/dev/null | tail -1)

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## 🔨 Implementation Complete (automated)

          - **Branch**: \`${BRANCH}\`
          - **PR**: #${{ steps.pr.outputs.pr_number }}
          - **Changes**: ${DIFF_STAT}

          Dev complete — card marked `stage:done`, awaiting pull into Test.

          ---
          _Generated by agent-dev | $(date -u +%Y-%m-%dT%H:%M:%SZ)_
          EOF
          )"

      - name: Mark done + advance (Dev->Test pull, or re-review after rework)
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -n "${{ inputs.rework }}" ]; then
            # Rework after a human changes-requested: the card stays in Human Review (no
            # backward move). Re-run agent-test on the reworked branch so it RE-TESTS and
            # re-sends the screenshot review album, then re-marks done. Keep stage:doing
            # (in flight) so the dispatcher's Notify holds off until agent-test finishes.
            gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" \
              --body "🔧 Rework pushed — re-running tests + capturing fresh review screenshots before re-review." >/dev/null 2>&1 || true
            gh api --method POST "repos/${{ github.repository }}/actions/workflows/agent-test.yml/dispatches" -f ref=master -f "inputs[issue_number]=${{ inputs.issue_number }}" >/dev/null 2>&1 || true
          else
            # Pull system: do NOT push to Test. Mark this card done-in-silo and stop.
            # The dispatcher pulls it into Test only when Test is under its WIP limit.
            gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=stage:done" >/dev/null 2>&1 || true
            gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true
            # Nudge the dispatcher to run a tick now so flow propagates immediately.
            gh api --method POST "repos/${{ github.repository }}/actions/workflows/dispatcher.yml/dispatches" -f ref=master >/dev/null 2>&1 || true
          fi

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x ./scripts/notify-telegram.sh

          # Hard agent failure → flag for a human and clear the in-flight marker so
          # the card isn't stuck counting against Dev WIP.
          gh api --method POST "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels" -f "labels[]=blocker" -f "labels[]=needs-human" >/dev/null 2>&1 || true
          gh api --method DELETE "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/labels/stage:doing" >/dev/null 2>&1 || true

          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ **Development agent failed.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          ./scripts/notify-telegram.sh \
            "⚠️ Dev agent failed for issue #${{ inputs.issue_number }}. Needs manual attention."
